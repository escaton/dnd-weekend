app = "dnd-weekend-test"
primary_region = "iad"

[build]
dockerfile = "Dockerfile"

[deploy]
release_command = "pnpm db:migrate"

[http_service]
internal_port = 3000
force_https = true
auto_stop_machines = true
auto_start_machines = true
min_machines_running = 0

[http_service.concurrency]
type = "requests"
hard_limit = 250
soft_limit = 200

[[http_service.checks]]
interval = "30s"
timeout = "5s"
grace_period = "10s"
method = "GET"
path = "/healthz"
