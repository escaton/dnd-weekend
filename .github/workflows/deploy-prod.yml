name: Deploy Prod

on:
  workflow_dispatch:
    inputs:
      commit_sha:
        description: "Commit SHA to deploy (defaults to latest main)"
        required: false
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.commit_sha || github.ref }}

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile --ignore-scripts
      - run: pnpm rebuild esbuild

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Determine commit SHA
        id: sha
        run: echo "value=${{ inputs.commit_sha || github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        run: |
          flyctl auth docker
          docker build \
            --build-arg VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }} \
            --build-arg VITE_SUPABASE_PUBLISHABLE_KEY=${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }} \
            -t registry.fly.io/dnd-weekend-prod:${{ steps.sha.outputs.value }} .
          docker push registry.fly.io/dnd-weekend-prod:${{ steps.sha.outputs.value }}
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Deploy to fly.io
        run: |
          flyctl deploy \
            --image registry.fly.io/dnd-weekend-prod:${{ steps.sha.outputs.value }} \
            --config fly.prod.toml
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
