name: Deploy Prod

on:
  workflow_dispatch:
    inputs:
      commit_sha:
        description: "Commit SHA to deploy (defaults to latest main)"
        required: false
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.commit_sha || github.ref }}

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Build
        run: pnpm --filter @dnd-weekend/web build

      - name: Configure prod deployment
        run: |
          node -e "
            const fs = require('fs');
            const configPath = 'apps/web/dist/dnd_weekend_test/wrangler.json';
            const config = JSON.parse(fs.readFileSync(configPath));
            config.name = 'dnd-weekend';
            config.hyperdrive[0].id = '9971f47dd14e4ac8b2c1d1171bd9ff33';
            config.vars = {
              SUPABASE_URL: 'https://spkpguayatzjdpoodmwd.supabase.co',
              SUPABASE_PUBLISHABLE_KEY: 'sb_publishable_7LQE7f82V9_87NkU9kXqWw_Jy7F6xQJ'
            };
            fs.writeFileSync(configPath, JSON.stringify(config));
          "

      - name: Deploy to Cloudflare
        run: npx wrangler deploy --config apps/web/dist/dnd_weekend_test/wrangler.json
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
