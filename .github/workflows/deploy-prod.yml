name: Deploy Prod

on:
  workflow_dispatch:
    inputs:
      commit_sha:
        description: "Commit SHA to deploy (defaults to latest main)"
        required: false
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.commit_sha || github.ref }}

      - uses: pnpm/setup@v1
        with:
          runtime: node@24
          cache: true
          install: false

      - run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Run database migrations
        run: pnpm --filter @dnd-weekend/api db:migrate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_PROD }}

      - name: Build
        run: CLOUDFLARE_ENV=prod pnpm --filter @dnd-weekend/web build

      - name: Deploy to Cloudflare
        run: pnpm --filter @dnd-weekend/web exec wrangler deploy --config dist/dnd_weekend/wrangler.json --name dnd-weekend
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
