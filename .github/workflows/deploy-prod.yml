name: Deploy Prod

on:
  workflow_dispatch:
    inputs:
      commit_sha:
        description: "Commit SHA to deploy (defaults to latest main)"
        required: false
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.commit_sha || github.ref }}

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Run database migrations
        run: pnpm --filter @dnd-weekend/api db:migrate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_PROD }}

      - name: Build
        run: CLOUDFLARE_ENV=prod pnpm --filter @dnd-weekend/web build

      - name: Deploy to Cloudflare
        run: npx wrangler deploy --config apps/web/dist/dnd_weekend/wrangler.json --name dnd-weekend
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
