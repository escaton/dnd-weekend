name: Deploy Test

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile --ignore-scripts
      - run: pnpm rebuild esbuild

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Build and push Docker image
        run: |
          flyctl auth docker
          docker build \
            --build-arg VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }} \
            --build-arg VITE_SUPABASE_PUBLISHABLE_KEY=${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }} \
            -t registry.fly.io/dnd-weekend-test:${{ github.event.workflow_run.head_sha }} .
          docker push registry.fly.io/dnd-weekend-test:${{ github.event.workflow_run.head_sha }}
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Deploy to fly.io
        run: |
          flyctl deploy \
            --image registry.fly.io/dnd-weekend-test:${{ github.event.workflow_run.head_sha }} \
            --config fly.test.toml
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
