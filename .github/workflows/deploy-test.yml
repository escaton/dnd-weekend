name: Deploy Test

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - run: flyctl deploy --config fly.test.toml
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
