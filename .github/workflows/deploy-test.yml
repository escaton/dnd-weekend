name: Deploy Test

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/setup@v1
        with:
          runtime: node@24
          cache: true
          install: false

      - run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Run database migrations
        run: pnpm --filter @dnd-weekend/api db:migrate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_TEST }}

      - name: Build
        run: CLOUDFLARE_ENV=test pnpm --filter @dnd-weekend/web build

      - name: Deploy to Cloudflare
        run: pnpm --filter @dnd-weekend/web exec wrangler deploy --config dist/dnd_weekend/wrangler.json --name dnd-weekend-test
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
