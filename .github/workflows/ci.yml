name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/setup@v1
        with:
          runtime: node@24
          cache: true
          install: false

      - run: pnpm install --frozen-lockfile --ignore-scripts

      - run: pnpm format:check

      - run: pnpm lint

      - run: pnpm typecheck

      - run: pnpm test --run
